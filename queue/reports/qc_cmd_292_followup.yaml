    ## cmd_292 Followup QC — _trim_line 末尾文字消去バグ修正

    ### バグの詳細
    _trim_line() で47文字を47列端末に書くとカーソルはcol=47に留まる。
    その直後の\033[K(EL)がcol=47の文字を消去。
    影響: ヘッダー時刻 "16:04:2"(7桁→6桁)、ボーダー末尾の+/|消失。

    ### 修正 (commit 2df72b9)
    ```bash
    if (( w >= max )); then
        TRIM_LINE_BUF="${result}"$'\n'        # \033[K省略
    else
        TRIM_LINE_BUF="${result}"$'\033[K\n'  # 短行のみEL
    fi
    ```

    ### 実機検証
    - 環境: shogun-teams:bmon_test 47列×50行
    - capture-pane 2回: 構造同一(チラツキなし)
    - hexdump: 47文字+0x0A = 末尾文字保持確認
    - 全9エージェント2列グリッド表示確認

