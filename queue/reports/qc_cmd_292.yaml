    ## cmd_292 QC結果 — battle_monitorチラツキ完全解消 v4

    ### v3→v4の進化
    v3: { trim_ansi_line ... } > tmpf → _frame=$(< tmpf) → printf '%s'
    問題: $(< file) がtrailing newlinesをストリップ → フレーム末尾不安定 → 残像

    v4: _trim_line() → TRIM_LINE_BUF → _outframe += → printf '%s'
    tmpfile完全廃止。全てbash変数内で完結。fork/subshellゼロ。

    ### コードレビュー詳細
    - TRIM_LINE_BUF: 行49に追加。グローバル変数で_trim_line()の戻り値を返す
    - _trim_line(): 行105-143。trim_ansi_lineと同じANSI-awareロジックだが
      printfの代わりにTRIM_LINE_BUF="${result}..."に代入
    - render()末尾: _outframe変数に\033[?25l\033[H → 各行 → \033[J を+=で連結
    - 最終出力: printf '%s' "$_outframe" — 1回write(2)

    ### 47列グリッド
    Python: num_cols = 2 if TERM_W < 60 else 3
    Bash fallback: GRID_NCOLS=2 if term_w < 60
    47列ペイン: 2列 × 22文字 + 3(gap) = 47 (exactly fits)

    ### 実機検証
    stdout出力で複数フレーム(15:24:08, 15:24:10, 15:24:13)を観測。
