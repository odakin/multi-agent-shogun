command: |
  家老が Haiku モデルで動作するようになった（config/settings.yaml: agents.karo.model: haiku）。
  しかし shogun.md の cmd 書式ガイドラインは Sonnet/Opus 家老を前提に書かれている。

  Haiku は:
  - 長い文脈の保持が弱い
  - 暗黙の意図の推測が苦手
  - 明示的・構造的な指示には従える
  - 機械的な繰り返し作業は得意

  v4.0 で家老は「配分マシン」に徹する設計。Haiku の強み（機械的作業）と合致する。
  しかし cmd の書き方が曖昧だと Haiku は迷う。

  検討すべきポイント:
  1. subtask description をどこまで具体的に書くべきか（Haiku がそのまま転記するなら、将軍が足軽向けの粒度で書くべきか）
  2. phases の mode 指定だけで Haiku が正しく並列/直列を判断できるか
  3. acceptance_criteria を Haiku が QC 依頼時にそのまま軍師に渡せる形式にすべきか
  4. command フィールドの背景情報を Haiku が正しく task YAML に引き継げるか
  5. bloom_level → model 変換を Haiku が間違えないよう、より明示的にすべきか

  リポジトリ: /Users/odakin/Claude/multi-agent-shogun
  対象ファイル: instructions/shogun.md（725行）
