# multi-agent-shogun 設定ファイル

# 言語設定
# ja: 日本語（戦国風日本語のみ、併記なし）
# en: 英語（戦国風日本語 + 英訳併記）
# その他の言語コード（es, zh, ko, fr, de 等）も対応
language: ja

# シェル設定
# bash: bash用プロンプト（デフォルト）
# zsh: zsh用プロンプト
shell: zsh

# Bloom Routing（cli_adapter.sh が top-level から読み取る）
# off: Bloom分析なし、モデル固定
# manual: bloom_analysis_required: true のタスクのみ軍師Bloom分析
# auto: 全タスクに軍師Bloom分析（L1-L3→sonnet, L4-L6→opus）
bloom_routing: manual

# エージェント設定（レガシー — cli.agents を使用せよ）
agents:
  ashigaru_count: 7   # 足軽の人数（1-9）。Karoがspawn時に参照。

# CLI設定（cli_adapter.sh が参照）
cli:
  agents:
    karo:
      model: haiku
    gunshi:
      model: opus
    ashigaru:
      model: sonnet  # 全足軽の基本モデル（bloom_level L4-L6タスク時はOpusに動的切替）

# スキル設定
skill:
  # スキル保存先（スキル名に shogun- プレフィックスを付けて保存）
  save_path: "~/.claude/skills/"

  # ローカルスキル保存先（このプロジェクト専用）
  local_path: "/Users/odakin/Claude/multi-agent-shogun/skills/"

# ログ設定
logging:
  level: info  # debug | info | warn | error
  path: "/Users/odakin/Claude/multi-agent-shogun/logs/"
